<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>السيرة الذاتية الرقمية | هايدي فوزي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: url('https://images.unsplash.com/photo-1510218830377-0e9d01d4944d?q=80&w=1600');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            position: relative;
        }

        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 550px;
            width: 90%;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            animation: slideUp 1s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            background: linear-gradient(135deg, #004586, #0072bc);
            color: white;
            padding: 40px 20px;
            text-align: center;
        }

        .logo {
            width: 90px;
            height: 90px;
            background: white;
            padding: 8px;
            border-radius: 50%;
            margin-bottom: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .main-content {
            padding: 20px 30px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        td {
            padding: 18px 10px;
            border-bottom: 1px solid #f0f0f0;
        }

        .label {
            font-weight: 700;
            color: #004586;
            width: 35%;
        }

        /* تأثير عند تمرير الماوس على الصفوف */
        tr:hover {
            background-color: #fcfcfc;
            transition: 0.3s;
        }

        .btn-contact {
            display: block;
            background: #e67e22;
            color: white;
            text-align: center;
            padding: 15px;
            text-decoration: none;
            border-radius: 12px;
            margin: 25px 0 10px;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(230, 126, 34, 0.3);
        }

        .btn-contact:hover {
            background: #d35400;
            transform: scale(1.02);
            box-shadow: 0 6px 20px rgba(211, 84, 0, 0.4);
        }

        footer {
            text-align: center;
            color: #fff;
            padding: 20px;
            font-size: 0.85em;
            width: 100%;
            position: absolute;
            bottom: 0;
            z-index: 1;
        }

        /* تحسينات للشاشات الصغيرة */
        @media (max-width: 480px) {
            .main-content { padding: 15px; }
            .label { width: 40%; font-size: 0.9em; }
            td { font-size: 0.9em; padding: 12px 5px; }
            h1 { font-size: 1.4em !important; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="logo.jpg" alt="شعار الجامعة" class="logo">
        <h1 style="margin:0; font-size: 1.8em;">هايدي فوزي محمد محمد</h1>
        <p style="margin:8px 0 0; opacity: 0.9; font-weight: 300;">قسم تكنولوجيا التعليم الرقمي</p>
    </div>

    <div class="main-content">
        <table>
            <tr>
                <td class="label">الكلية:</td>
                <td>كلية التربية - جامعة عين شمس</td>
            </tr>
            <tr>
                <td class="label">المقرر:</td>
                <td>تصميم مواقع</td>
            </tr>
            <tr>
                <td class="label">الدكتور:</td>
                <td>د. محمد عنتر</td>
            </tr>
            <tr>
                <td class="label">المستوى:</td>
                <td>الثالث (الفصل الدراسي الثاني)</td>
            </tr>
            <tr>
                <td class="label">الإيميل:</td>
                <td style="font-size: 0.85em; color: #666;">free_edu2324049@edu.asu.edu.eg</td>
            </tr>
        </table>

        <a href="mailto:free_edu2324049@edu.asu.edu.eg" class="btn-contact">إرسال رسالة بريد إلكتروني</a>
    </div>
</div>

<footer>
    مشروع مقرر تصميم المواقع &copy; 2025 | الطالبة هايدي فوزي
</footer>

</body>

</html>
