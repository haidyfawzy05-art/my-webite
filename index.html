<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تهنئة خاصة</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            /* خلفية وردية هادئة جداً */
            background-color: #fffafa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
        }

        #main-content {
            display: none;
            background: white;
            padding: 40px 25px;
            border-radius: 30px;
            /* ظل بلون وردي خفيف */
            box-shadow: 0 10px 40px rgba(255, 71, 87, 0.1);
            /* الخط العلوي باللون الأحمر الجميل */
            border-top: 6px solid #ff4757;
            max-width: 420px;
            margin: 20px;
            animation: fadeIn 1.2s ease-out;
        }

        .expired-msg {
            color: #ff4757;
            font-size: 18px;
            font-weight: bold;
        }

        h1 {
            color: #ff4757;
            font-size: 26px;
            margin-bottom: 25px;
        }

        p {
            color: #444;
            font-size: 18px;
            line-height: 1.8;
            margin: 12px 0;
        }

        .special-line {
            color: #ff6b81;
            font-weight: bold;
            font-size: 20px;
            margin-top: 20px;
            border-top: 1px dashed #ffd1d1;
            padding-top: 15px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div id="error-screen" class="expired-msg" style="display: none;">
        🔒 عذراً، انتهت صلاحية هذا الرابط!
        <br><small style="color: #999; font-weight: normal;">(متاح للمشاهدة مرة واحدة فقط)</small>
    </div>

    <div id="main-content">
        <h1>كل سنة وأنت طيب ✨</h1>
        <p>عقبال 100 سنة سعيدة عليك يارب 🎈</p>
        <p>ويارب تحقق كل اللي بتتمناه وتشوف الخير دايماً 🌟</p>
        <p>وربنا يريح بالك وقلبك ويعوضك بالخير ويهديك 🙏</p>
        <p class="special-line">ربنا يجعلها سنة سعيدة عليك 😊</p>
    </div>

    <script>
        // مفتاح جديد لضمان عمل الرابط عند التجربة الأولى على GitHub
        const visitKey = "birthday_final_red_v2";
        
        if (localStorage.getItem(visitKey)) {
            document.getElementById("error-screen").style.display = "block";
        } else {
            document.getElementById("main-content").style.display = "block";
            localStorage.setItem(visitKey, "true");
        }
    </script>

</body>
</html>
